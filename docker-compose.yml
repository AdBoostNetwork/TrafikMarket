name: traffmarket

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-traffmarket}
    volumes:
      - traffmarket_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-traffmarket}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/traffmarket?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.scheduler
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/traffmarket?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SCHEDULER_RUN_HOUR: ${SCHEDULER_RUN_HOUR:-3}
      TGSTAT_QUEUE: ${TGSTAT_QUEUE:-updater.tgstat}
      MAXDASH_QUEUE: ${MAXDASH_QUEUE:-updater.maxdash}
    volumes:
      - ./logs/scheduler:/app/backend/updater/scheduler/logs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  traffmarket_data:
    name: traffmarket
  rabbitmq_data:
    name: traffmarket_rabbitmq
