x-database-env: &database-env
  DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/traffmarket?sslmode=disable}

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-traffmarket}
    volumes:
      - trafikmarket_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-traffmarket}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.migrate
    environment: *database-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  trafikmarket_data:
    name: traffmarket_postgres
