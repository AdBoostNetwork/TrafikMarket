<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Реферальная ссылка</title>

  <link rel="stylesheet" href="../style.css" />

  <style>
    .app { padding-top: 18px; }

    .content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 8px;
    }

    .center-wrap {
      width: 84%;
      max-width: 360px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .logo-card {
      width: 90%;
      margin: 0 auto;
      display: block;
      background: var(--card);
      border-radius: 25px;
      min-height: 0;
      height: 140px;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .logo-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
    }

    .section-title {
      color: var(--muted);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.05px;
      margin-top: 12px;
      margin-bottom: -8px;
      margin-left: 38px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .ref-input {
      width: 90%;
      margin: 0 auto;
      background: var(--card);
      border-radius: 28px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ref-input input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-btn {
      border: 0;
      background: transparent;
      cursor: pointer;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
    }

    .copy-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .copy-btn img {
      width: 22px;
      height: 22px;
      opacity: 0.9;
      filter: brightness(0) saturate(0) invert(71%) sepia(1%) saturate(0%) hue-rotate(173deg) brightness(90%) contrast(85%);
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      margin-top: 2px;
      margin-bottom: -10px;
    }

    .refs-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 8px;
    }

    .ref-user {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border-radius: 40px;
      padding: 10px 14px;
    }

    .ref-user__avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #4a4a4d;
    }

    .ref-user__avatar-fallback {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      background: #7ED574;
    }

    .ref-user__main {
      min-width: 0;
    }

    .ref-user__name {
      color: var(--white);
      font-size: 16px;
      font-weight: 500;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ref-user__meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      color: white;
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ref-user__right {
      text-align: right;
      margin-right: 10px;
      color: var(--accent);
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .ref-user__vip {
      --vip-color: var(--muted);
      color: var(--vip-color);
      font-weight: 400;
    }


    .refs-empty {
      text-align: left;
      margin-left: 38px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 2px 0;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="content">
      <div class="center-wrap">

        <a class="logo-card" href="https://example.com" target="_blank" rel="noopener noreferrer">
            <img class="logo-svg" src="../icons/logo.svg" alt="TrafficMarket">
        </a>

        <div class="section-title">Реферальная ссылка</div>

        <label class="sr-only" for="refLink">Реферальная ссылка</label>
        <div class="ref-input">
          <input id="refLink" type="text" value="https://t.me/..." readonly />
          <button class="copy-btn" id="copyBtn" aria-label="Скопировать">
            <img src="../icons/copy_link.svg" alt="" />
          </button>
        </div>
        <div class="hint" id="copyHint">
        </div>
        <div class="section-title">Приглашённые пользователи</div>
        <div class="refs-list" id="refsList"></div>

      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="./menu.html">
      <img src="../icons/menu.svg" alt="" />
      <span>Меню</span>
    </a>
    <a class="nav-item" href="./orders.html">
      <img src="../icons/orders.svg" alt="" />
      <span>Заказы</span>
    </a>
    <a class="nav-item active" href="./refs.html">
      <img src="../icons/refs.svg" alt="" />
      <span>Пригласить</span>
    </a>
    <a class="nav-item" href="./profile.html">
      <img src="../icons/profile.svg" alt="" />
      <span>Профиль</span>
    </a>
  </nav>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    const DEFAULT_LINK = "https://t.me/...";
    const DEFAULT_HINT = "";
    const COPY_SUCCESS_TEXT = "Ссылка успешно скопирована";
    let currentRefLink = DEFAULT_LINK;
    let copyFeedbackTimer = null;

    const VIP_STATUS = {
      1: { name: "Silver", color: "#C0C0C0" },
      2: { name: "Gold", color: "#FFBD1B" },
    };

    function getUserIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const v = params.get("user_id");
      return v ? v.trim() : null;
    }

    function withUserId(url) {
      const userId = getUserIdFromQuery();
      if (!userId) return url;

      const u = new URL(url, window.location.href);
      u.searchParams.set("user_id", userId);
      return u.href;
    }

    function patchBottomNavLinks() {
      document.querySelectorAll(".bottom-nav a.nav-item").forEach(a => {
        const href = a.getAttribute("href");
        if (href) a.setAttribute("href", withUserId(href));
      });
    }

    patchBottomNavLinks();

    function setHint(text) {
      document.getElementById("copyHint").textContent = text;
    }

    async function safeCopyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    function getVipInfo(status) {
      return VIP_STATUS[Number(status)] || { name: "Unknown", color: "" };
    }

    function formatDealsSum(value) {
      const num = Number(value || 0);
      return `$${num}`;
    }

    function formatProfit(value) {
      const num = Number(value || 0);
      return `$${num.toFixed(2)}`;
    }

    function getInitial(name) {
      const s = String(name || "").trim();
      return s ? s[0].toUpperCase() : "?";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function bindAvatarFallback(root) {
      root.querySelectorAll("img.ref-user__avatar").forEach(img => {
        const applyFallback = () => {
          const fallback = document.createElement("div");
          fallback.className = "ref-user__avatar-fallback";
          fallback.textContent = img.dataset.initial || "?";
          img.replaceWith(fallback);
        };

        if (img.complete && img.naturalWidth === 0) {
          applyFallback();
          return;
        }

        img.addEventListener("error", applyFallback, { once: true });
      });
    }

    function renderReferrals(referrals) {
      const list = document.getElementById("refsList");

      if (!Array.isArray(referrals) || referrals.length === 0) {
        list.innerHTML = `<div class="refs-empty">У вас пока нет ни одного <br>приглашённого пользователя</div>`;
        return;
      }

      list.innerHTML = referrals.map(user => {
        const vip = getVipInfo(user.vip_status);
        const safeName = escapeHtml(user.name || "Без имени");
        const safeInitial = escapeHtml(getInitial(user.name));

        const avatar = user.avatar_filename
          ? `<img class="ref-user__avatar" src="../avatars/${encodeURIComponent(user.avatar_filename)}" alt="${safeName}" data-initial="${safeInitial}">`
          : `<div class="ref-user__avatar-fallback">${safeInitial}</div>`;

        return `
          <div class="ref-user">
            ${avatar}

            <div class="ref-user__main">
              <div class="ref-user__name">${safeName}</div>

              <div class="ref-user__meta">
                <span class="ref-user__vip" style="--vip-color: ${vip.color};">${vip.name}</span>
                <span>•</span>
                <span>${formatDealsSum(user.deals_summ)}</span>
              </div>
            </div>

            <div class="ref-user__right">${formatProfit(user.profit)}</div>
          </div>
        `;
      }).join("");
      bindAvatarFallback(list);
    }

    async function loadRefLink() {
      const userId = getUserIdFromQuery();

      if (!userId) {
        currentRefLink = DEFAULT_LINK;
        document.getElementById("refLink").value = currentRefLink;
        setHint(DEFAULT_HINT);
        renderReferrals([]);
        return;
      }

      try {
        const url = `${API_BASE}/ref_link?user_id=${encodeURIComponent(userId)}`;
        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));

        if (data && typeof data.ref_link === "string" && data.ref_link.trim()) {
          currentRefLink = data.ref_link.trim();
          document.getElementById("refLink").value = currentRefLink;
          setHint(DEFAULT_HINT);
        } else {
          currentRefLink = DEFAULT_LINK;
          document.getElementById("refLink").value = currentRefLink;
          setHint("Неожиданный ответ сервера.");
        }

        if (Array.isArray(data.refs_list)) {
          renderReferrals(data.refs_list);
        } else {
          renderReferrals([]);
        }
      } catch (e) {
        currentRefLink = DEFAULT_LINK;
        document.getElementById("refLink").value = currentRefLink;
        setHint("Ошибка сети: не удалось загрузить ссылку.");
        renderReferrals([]);
      }
    }

    document.getElementById("copyBtn").addEventListener("click", async () => {
      const input = document.getElementById("refLink");
      const val = (currentRefLink || "").trim();
      if (!val) return;

      try {
        await safeCopyToClipboard(val);
        if (copyFeedbackTimer) clearTimeout(copyFeedbackTimer);
        input.value = COPY_SUCCESS_TEXT;
        setHint(DEFAULT_HINT);
        copyFeedbackTimer = setTimeout(() => {
          input.value = currentRefLink;
          copyFeedbackTimer = null;
        }, 1400);
      } catch (e) {
        setHint("Не получилось скопировать ссылку.");
      }
    });

    loadRefLink();

  </script>
</body>
</html>
