<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Просмотр объявления</title>

  <link rel="stylesheet" href="../style.css" />

  <style>
    .app { padding-top: 14px; }

    .content{
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: calc(150px + env(safe-area-inset-bottom));
    }

    .center-wrap{
      width: 84%;
      max-width: 360px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .top-bar{
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .back-link{
      text-decoration: none;
      color: var(--accent, #3b82f6);
      font-weight: 500;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .section-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      margin-top: 4px;
      margin-bottom: -2px;
      margin-left: 13px;
    }

    #chartsBlock > .section-title{
      margin-bottom: 10px;
    }

    .card{
      width: 100%;
      background: var(--card);
      border-radius: 24px;
      padding: 12px 12px;
    }

    .seller-row{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .seller-left{
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .seller-avatar{
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #5b7cff;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .seller-avatar img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .seller-letter{
      color: #fff;
      font-weight: 600;
      font-size: 18px;
      line-height: 1;
      user-select: none;
    }

    .seller-name{
      color: var(--white);
      font-weight: 300;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }

    .seller-right{
      color: var(--white);
      font-weight: 300;
      font-size: 14px;
      opacity: 0.95;
      white-space: nowrap;
    }

    .rows{ display: flex; flex-direction: column; }

    .row{
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 2px;
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    .row:first-child{ border-top: 0; padding-top: 6px; }

    .row-label{
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      font-size: 14px;
      margin-left: 2px;
    }

    .row-value{
      color: var(--white);
      font-weight: 600;
      font-size: 14px;
      text-align: right;
    }

    .price{
      color: var(--accent, #3b82f6);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .chip{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.22);
      color: var(--white);
      font-weight: 700;
      font-size: 13px;
      line-height: 1;
      background: rgba(0,0,0,0.10);
      white-space: nowrap;
    }

    .desc{
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .media-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .link{
      color: var(--accent, #3b82f6);
      text-decoration: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .link:focus{ outline: none; }
    .link:active{ color: var(--accent, #3b82f6); }

    .chart-card{
      background: #232324;
      border: 1.5px solid rgba(74, 84, 110, 0.66);
      border-radius: 19px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.02);
      padding: 28px 14px 24px 30px;
      overflow: hidden;
      position: relative;
    }

    .chart-content{
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(118px, 38%);
      column-gap: 22px;
      align-items: center;
    }

    .chart-main{
      min-width: 0;
      padding-right: 8px;
    }

    .chart-value{
      margin: 0 0 14px;
      font-size: 42px;
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #ffffff;
    }

    .chart-value.compact{
      font-size: 34px;
      letter-spacing: -0.03em;
    }

    .chart-metrics{
      display: grid;
      gap: 4px;
    }

    .chart-metric{
      display: grid;
      grid-template-columns: max-content max-content;
      column-gap: 10px;
      align-items: baseline;
      font-size: 13px;
      line-height: 1;
    }

    .chart-metric-value{
      color: #3f7cff;
      white-space: nowrap;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      text-align: left;
    }

    .chart-metric-label{
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      font-weight: 500;
    }

    .chart-wrap{
      justify-self: end;
      width: 132px;
      height: 90px;
      flex: 0 0 132px;
      margin-left: 12px;
      overflow: hidden;
    }

    .chart-fade{
      position: absolute;
      inset: 0 auto 0 0;
      width: 24px;
      background: linear-gradient(90deg, #232324 0%, rgba(35,35,36,0) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .chart-wrap svg{
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    .chart-area{
      opacity: 0.9;
    }

    .chart-line{
      fill: none;
      stroke: #3f7cff;
      stroke-width: 2.05;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(63,124,255,0.12));
    }

    .chart-toggle{
      position: absolute;
      left: 50%;
      bottom: -2px;

      transform: translateX(-50%);
      z-index: 10;

      width: 58px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: transparent;

      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .chart-toggle::before{
      content: "";
      display: block;
      width: 34px;
      height: 16px;
      background-color: rgba(255,255,255,0.55);
      -webkit-mask: url("../icons/chart-toggle-arrow.png") center / contain no-repeat;
      mask: url("../icons/chart-toggle-arrow.png") center / contain no-repeat;
      transform-origin: 50% 50%;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    .chart-toggle.open::before{
      transform: scaleY(-1);
    }

    .chart-toggle.hidden{ display:none; }

    .tgstat-wrap{
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chart-item{
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chart-item-title{
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      margin: 0 0 0 13px;
    }

    .tgstat-wrap .chart-item:first-child{
      gap: 12px;
    }

    .tgstat-collapse{
      width: 100%;
      display: grid;
      place-items: center;
      margin-top: 6px;
    }

    .tgstat-collapse button{
      width: 40px;
      height: 30px;
      border-radius: 999px;
      border: 0;
      background: rgba(0,0,0,0);
      color: rgba(255,255,255,0.65);
      font-size: 22px;
      cursor: pointer;
    }

    .skeleton{
      position: relative;
      overflow: hidden;
      background: #2b2c30;
      border-radius: 999px;
    }
    .skeleton::after{
      content:"";
      position:absolute;
      inset:0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
      animation: shimmer 1.35s ease-in-out infinite;
    }
    @keyframes shimmer{ 100%{ transform: translateX(100%);} }

    .value-skeleton{ width: 176px; height: 44px; border-radius: 12px; margin-bottom: 12px; }
    .metric-skeleton{ width: 176px; height: 20px; border-radius: 8px; }
    .chart-skeleton{ position:absolute; inset:0; border-radius: 12px; }

    @media (max-width: 420px){
      .chart-content{ grid-template-columns: minmax(0, 1fr) 122px; column-gap: 14px; }
      .chart-main{ padding-right: 0; }
      .chart-wrap{ justify-self: end; width: 128px; height: 86px; margin: 0 4px 0 0; }
    }

    .media-item{
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      background: var(--card);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .media-item img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .media-placeholder{
      color: rgba(255,255,255,0.70);
      font-weight: 700;
      font-size: 18px;
    }

    .bottom-actions{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;

      background: rgba(30, 30, 30, 1);

      box-shadow: 0 -1px 0 rgba(255,255,255,0.08);

      padding: 16px 18px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));

      display: flex;
      flex-direction: column;
      gap: 12px;

      z-index: 9999;
    }


    .btn{
      pointer-events: auto;
      width: 84%;
      max-width: 360px;
      margin: 0 auto;
      border: 0;
      border-radius: 999px;
      padding: 14px 16px;
      font-weight: 1000;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }

    .btn:active{ transform: scale(0.99); opacity: 0.95; }

    .btn-gray{ background: var(--card); color: var(--white); }
    .btn-blue{ background: var(--accent, #3b82f6); color: #fff; }

    .btn, .card, .media-item { transition: none !important; }
    .btn:hover, .card:hover, .media-item:hover { transform: none !important; box-shadow: none !important; }
  </style>
</head>

<body>
  <div class="app">
    <div class="content">
      <div class="center-wrap">

        <div class="top-bar">
          <a class="back-link" id="backBtn" href="./watch_list.html">← Назад</a>
        </div>

        <div class="section-title">Вы покупаете у</div>
        <div class="card" style="border-radius: 40px">
          <div class="seller-row">
            <div class="seller-left">
              <div class="seller-avatar" id="sellerAvatar">
                <div class="seller-letter">?</div>
              </div>
              <div class="seller-name" id="sellerName">—</div>
            </div>
            <div class="seller-right" id="sellerStats">Сделок: — • —%</div>
          </div>
        </div>

        <div class="section-title">Объявление</div>
        <div class="card">
          <div class="rows" id="announRows"></div>
        </div>

        <div class="card" id="articleCard" style="display:none;">
          <div class="rows">
            <div class="row" style="border-top:0; padding-top:0px;padding-bottom:0px">
              <div class="row-label">ID объявления</div>
              <div class="row-value" id="articleValue">—</div>
            </div>
          </div>
        </div>

<div id="chartsBlock" style="display:none;">
  <div class="section-title">История изменения цены</div>

  <div class="chart-card">
    <button id="tgstatToggle" class="chart-toggle" type="button" aria-label="Показать графики TGStat"></button>
    <div class="chart-content">
      <div class="chart-main">
        <div id="priceCurrent" class="chart-value">—</div>

        <div class="chart-metrics">
          <div class="chart-metric">
            <span id="priceYesterday" class="chart-metric-value">—</span>
            <span class="chart-metric-label">за вчера</span>
          </div>
          <div class="chart-metric">
            <span id="priceWeek" class="chart-metric-value">—</span>
            <span class="chart-metric-label">за неделю</span>
          </div>
          <div class="chart-metric">
            <span id="priceMonth" class="chart-metric-value">—</span>
            <span class="chart-metric-label">за месяц</span>
          </div>
        </div>
      </div>

      <div class="chart-wrap">
        <div class="chart-fade" aria-hidden="true"></div>
        <svg viewBox="0 0 180 124" preserveAspectRatio="none" aria-label="График изменения цены">
          <defs>
            <linearGradient id="areaGradientPrice" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#4b78ff" stop-opacity="0.22"></stop>
              <stop offset="100%" stop-color="#4b78ff" stop-opacity="0.02"></stop>
            </linearGradient>
          </defs>
          <path id="priceAreaPath" class="chart-area" fill="url(#areaGradientPrice)"></path>
          <path id="priceLinePath" class="chart-line"></path>
        </svg>
      </div>
    </div>
  </div>

  <div id="tgstatCharts" style="display:none;"></div>
</div>
        <div class="section-title">Подробное описание</div>
        <div class="card">
          <div class="desc" id="longText">—</div>
        </div>

        <div class="section-title">Прикрепленные медиа</div>
        <div class="media-grid" id="mediaGrid"></div>

      </div>
    </div>
  </div>

  <div class="bottom-actions">
    <button class="btn btn-gray" id="contactBtn">Связаться с продавцом</button>
    <button class="btn btn-blue" id="payBtn">Перейти к оплате</button>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const ENDPOINT = "/get_announ_info";
    const PRICE_CHART_ENDPOINT = "/price_chart";
    const TGSTAT_CHARTS_ENDPOINT = "/tgstat_charts";

    const USE_MOCK_CHARTS = true; // капитан-заглушка тест

    const MOCK_PRICE_CHART = {

        { period: "2026-04-06", value: 12200 },

        { period: "2026-04-03", value: 11100 },

        { period: "2026-04-01", value: 10400 },

    };

    const MOCK_TGSTAT_CHARTS = [
      {

        yesterday_delta: "+120",
        week_delta: "+640",
        month_delta: "+2100",
        points: [
          { period: "2026-04-07", participants_count: 23500 },
          { period: "2026-04-06", participants_count: 23380 },
          { period: "2026-04-05", participants_count: 23210 },
          { period: "2026-04-04", participants_count: 23140 },
          { period: "2026-04-03", participants_count: 23020 }
        ]
      },
      {
        title: "views",
        current_value: 4200,
        yesterday_delta: "+180",
        week_delta: "+600",
        month_delta: null,
        points: [
          { period: "2026-04-07", views_count: 4200 },
          { period: "2026-04-06", views_count: 4020 },
          { period: "2026-04-05", views_count: 3980 },
          { period: "2026-04-04", views_count: 3870 },
          { period: "2026-04-03", views_count: 3690 }
        ]
      },
      {
        title: "avg-posts-reach",
        current_value: 6400,
        yesterday_delta: "+90",
        week_delta: "+310",
        month_delta: "+800",
        points: [
          { period: "2026-04-07", avg_posts_reach: 6400 },
          { period: "2026-04-06", avg_posts_reach: 6310 },
          { period: "2026-04-05", avg_posts_reach: 6220 },
          { period: "2026-04-04", avg_posts_reach: 6150 },
          { period: "2026-04-03", avg_posts_reach: 6010 }
        ]
      },
      {
        title: "er",
        current_value: 18,
        yesterday_delta: "+1",
        week_delta: "+2",
        month_delta: null,
        points: [
          { period: "2026-04-07", er: 18 },
          { period: "2026-04-06", er: 17 },
          { period: "2026-04-05", er: 16 },
          { period: "2026-04-04", er: 16 },
          { period: "2026-04-03", er: 15 }
        ]
      },
      {
        title: "err",
        current_value: 12,
        yesterday_delta: "+1",
        week_delta: "+2",
        month_delta: "+3",
        points: [
          { period: "2026-04-07", err: 12 },
          { period: "2026-04-06", err: 11 },
          { period: "2026-04-05", err: 10 },
          { period: "2026-04-04", err: 10 },
          { period: "2026-04-03", err: 9 }
        ]
      },
      {
        title: "err24",
        current_value: 7,
        yesterday_delta: "+0",
        week_delta: "+1",
        month_delta: null,
        points: [
          { period: "2026-04-07", err24: 7 },
          { period: "2026-04-06", err24: 7 },
          { period: "2026-04-05", err24: 6 },
          { period: "2026-04-04", err24: 6 },
          { period: "2026-04-03", err24: 6 }
        ]
      }
    ];
    const MEDIA_BASE = "../announs_media/";

    const PAY_LINK_TEMPLATE = "https://t.me/YOUR_BOT?start=pay_{announ_id}";

    function qs(name) {
      const p = new URLSearchParams(window.location.search);
      const v = p.get(name);
      return v ? v.trim() : null;
    }

    function withUserId(url) {
      const userId = qs("user_id");
      if (!userId) return url;
      const u = new URL(url, window.location.href);
      u.searchParams.set("user_id", userId);
      return u.pathname + u.search;
    }

    function isTruthy(v) {
      return v !== null && v !== undefined && String(v).trim() !== "";
    }

    function formatNumber(v) {
      if (v === null || v === undefined) return "—";
      const n = Number(v);
      if (Number.isNaN(n)) return String(v);
      return new Intl.NumberFormat("ru-RU").format(n);
    }

    function humanizeCountry(code) {
      if (!isTruthy(code)) return "—";
      const c = String(code).toUpperCase();
      if (c === "RUS" || c === "RU") return "Россия";
      return code;
    }

    function rowText(label, value, extraClass = "") {
      const row = document.createElement("div");
      row.className = "row";
      const l = document.createElement("div");
      l.className = "row-label";
      l.textContent = label;
      const r = document.createElement("div");
      r.className = "row-value " + extraClass;
      r.textContent = value;
      row.appendChild(l);
      row.appendChild(r);
      return row;
    }

    function rowChip(label, value) {
      const row = document.createElement("div");
      row.className = "row";
      const l = document.createElement("div");
      l.className = "row-label";
      l.textContent = label;
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = value;
      const r = document.createElement("div");
      r.className = "row-value";
      r.appendChild(chip);
      row.appendChild(l);
      row.appendChild(r);
      return row;
    }

    function renderSeller(seller) {
      const name = seller?.name ?? "—";
      document.getElementById("sellerName").textContent = name;

      const deals = seller?.deals_count ?? 0;
      const rating = seller?.rating ?? 0;
      document.getElementById("sellerStats").textContent = `Сделок: ${formatNumber(deals)} • ☆ ${formatNumber(rating)}`;

      const avatarFilename = seller?.avatar_filename;
      const avatarBox = document.getElementById("sellerAvatar");
      avatarBox.innerHTML = "";

      if (isTruthy(avatarFilename)) {
        const img = document.createElement("img");
        img.src = "../users_avas/" + avatarFilename;
        img.alt = "";
        avatarBox.appendChild(img);
      } else {
        const letter = (String(name).trim()[0] || "?").toUpperCase();
        const div = document.createElement("div");
        div.className = "seller-letter";
        div.textContent = letter;
        avatarBox.appendChild(div);
      }
    }

    function renderAnnounRows(type, info) {
      const box = document.getElementById("announRows");
      box.innerHTML = "";

      const fmtUSDT = (v) => (v === null || v === undefined ? "—" : `${formatNumber(v)} USDT`);
      const fmtBool = (v) => (v ? "Да" : "Нет");
      const fmtArticle = (v) => (v === null || v === undefined || v === "" ? "—" : `#${v}`);

      const addLinkRow = (label, url) => {
        const row = document.createElement("div");
        row.className = "row";
        const l = document.createElement("div");
        l.className = "row-label";
        l.textContent = label;

        const r = document.createElement("div");
        r.className = "row-value";

        if (isTruthy(url)) {
          const a = document.createElement("a");
          a.className = "link";
          a.href = url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = url;
          r.appendChild(a);
        } else {
          r.textContent = "—";
        }

        row.appendChild(l);
        row.appendChild(r);
        return row;
      };

      const add = (label, value, kind = "text", extraClass = "", fmt = null) => {
        const v = fmt ? fmt(value) : (isTruthy(value) ? String(value) : "—");
        if (kind === "chip") box.appendChild(rowChip(label, v));
        else box.appendChild(rowText(label, v, extraClass));
      };

      if (type === "channel") {
        add("Название", info?.title);
        box.appendChild(addLinkRow("Ссылка", info?.channel_link));
        add("Цена", info?.price, "text", "price", fmtUSDT);
        add("Тематика", info?.topic, "chip");
        add("Тип канала", info?.chn_type, "chip");
        add("Страна", info?.country, "chip", "", humanizeCountry);

    function renderMedia(imgs) {

      final.forEach((filename, idx) => {

    async function loadAnnoun() {
      const announId = qs("announ_id");

      if (!announId) {
        const demo = getPlaceholderData();
        renderSeller(demo.announ_info.seller);
        renderAnnounRows(demo.type, demo.announ_info);
        renderDescription(demo.announ_info);
        renderMedia(demo.announ_info.imgs);
        loadPriceChart("mock", demo.type, demo.announ_info?.channel_link);
        renderArticle(demo.announ_info.article);
        document.getElementById("payBtn").onclick = () => alert("Заглушка");
        document.getElementById("contactBtn").onclick = () => alert("Заглушка");
        return;
      }

      try {
        const url = `${API_BASE}${ENDPOINT}?announ_id=${encodeURIComponent(announId)}`;
        const res = await fetch(url);
        const data = await res.json().catch(() => null);

        if (!data || !data.announ_info) {
          const demo = getPlaceholderData();

        const info = data.announ_info;

        renderDescription(info);

        loadPriceChart(announId, type, info?.channel_link);
        renderArticle(info.article);

        const payLink = PAY_LINK_TEMPLATE.replace("{announ_id}", encodeURIComponent(announId));
        document.getElementById("payBtn").onclick = () => window.open(payLink, "_blank");
        document.getElementById("contactBtn").onclick = () => alert("Заглушка");

      } catch (e) {
        const demo = getPlaceholderData();
        renderSeller(demo.announ_info.seller);
        renderAnnounRows(demo.type, demo.announ_info);
        renderDescription(demo.announ_info);
        renderMedia(demo.announ_info.imgs);
      }
    }

    (function setupBack() {
      const category = qs("category");
      const u = new URL("./watch_list.html", window.location.href);
      const userId = qs("user_id");
      if (userId) u.searchParams.set("user_id", userId);
      if (category) u.searchParams.set("category", category);
      document.getElementById("backBtn").setAttribute("href", u.pathname + u.search);
    })();

    const CURRENCY = '$';

    function formatMainUSD(v){
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "—";
      return `${formatNumber(Number(v))}${CURRENCY}`;
    }

    function formatDeltaUSD(v){
      if (v === null || v === undefined) return "—";
      const s = String(v).trim();
      if (!s) return "—";
      const hasSign = s.startsWith("+") || s.startsWith("-");
      return `${hasSign ? s : `+${s}`}${CURRENCY}`;
    }

    function formatDelta(v){
      if (v === null || v === undefined) return "—";
      const s = String(v).trim();
      if (!s) return "—";
      const hasSign = s.startsWith("+") || s.startsWith("-");
      return hasSign ? s : `+${s}`;
    }

    function sortPoints(points){
      return [...points].sort((a,b)=> new Date(a.period) - new Date(b.period));
    }

    function buildSmoothPath(points){
      if (points.length < 2){
        return points.length ? `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}` : "";
      }

      const tangents = points.map((p, i) => {
        if (i === 0) return (points[1].y - p.y) / (points[1].x - p.x);
        if (i === points.length - 1) return (p.y - points[i-1].y) / (p.x - points[i-1].x);
        return (points[i+1].y - points[i-1].y) / (points[i+1].x - points[i-1].x);
      });

      let path = `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;
      for (let i=0;i<points.length-1;i++){
        const cur = points[i], next = points[i+1];
        const dx = next.x - cur.x;
        const c1x = cur.x + dx/3;
        const c2x = next.x - dx/3;
        const c1y = cur.y + tangents[i]*dx/3;
        const c2y = next.y - tangents[i+1]*dx/3;
        path += ` C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${next.x.toFixed(2)} ${next.y.toFixed(2)}`;
      }
      return path;
    }

    function buildChartPath(points, width, height, padding, valueGetter){
      const safe = (points||[])
        .filter(p => p && p.period)
        .map(p => ({ period: p.period, value: valueGetter(p) }))
        .filter(p => p.value !== null && p.value !== undefined && !Number.isNaN(Number(p.value)));

      const normalized = sortPoints(safe);
      if (!normalized.length) return { line:"", area:"" };

      const values = normalized.map(p => Number(p.value));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = (max - min) || 1;

      const stepX = normalized.length === 1 ? 0 : (width - padding.left - padding.right) / (normalized.length - 1);
      const floorY = height - padding.bottom;
      const topY = padding.top;

      const coords = normalized.map((p, idx)=>{
        const x = padding.left + stepX * idx;
        const norm = (Number(p.value) - min) / range;
        const y = floorY - norm * (floorY - topY) * 0.82;
        return {x,y};
      });

      const line = buildSmoothPath(coords);
      const area = `${line} L ${coords[coords.length-1].x.toFixed(2)} ${floorY.toFixed(2)} L ${coords[0].x.toFixed(2)} ${floorY.toFixed(2)} Z`;
      return { line, area };
    }

    async function loadPriceChart(announId, type, channelLink){
      const block = document.getElementById("chartsBlock");
      const toggle = document.getElementById("tgstatToggle");

      block.style.display = "block";

      const canTgstat = (type === "channel" || type === "ad");
      toggle.classList.toggle("hidden", !canTgstat);

      try{
        let payload;

        if (USE_MOCK_CHARTS) {
          payload = MOCK_PRICE_CHART;
        } else {
          const url = `${API_BASE}${PRICE_CHART_ENDPOINT}?announ_id=${encodeURIComponent(announId)}`;
          const res = await fetch(url);
          payload = await res.json();
        }

        const currentNode = document.getElementById("priceCurrent");
        currentNode.textContent = formatMainUSD(payload.current_value);
        currentNode.classList.toggle("compact", currentNode.textContent.length > 7);

        document.getElementById("priceYesterday").textContent = formatDeltaUSD(payload.yesterday_delta);
        document.getElementById("priceWeek").textContent = formatDeltaUSD(payload.week_delta);
        document.getElementById("priceMonth").textContent = formatDeltaUSD(payload.month_delta);

        const line = document.getElementById("priceLinePath");
        const area = document.getElementById("priceAreaPath");

        const paths = buildChartPath(payload.points || [], 180, 124, {top:18,right:10,bottom:18,left:22}, p => p.value);
        line.setAttribute("d", paths.line);
        area.setAttribute("d", paths.area);

      }catch(e){
        document.getElementById("priceCurrent").textContent = "—";
        document.getElementById("priceYesterday").textContent = "—";
        document.getElementById("priceWeek").textContent = "—";
        document.getElementById("priceMonth").textContent = "—";
        document.getElementById("priceLinePath").setAttribute("d","");
        document.getElementById("priceAreaPath").setAttribute("d","");
      }

      let tgLoaded = false;
      let tgOpen = false;
      toggle.classList.remove("open");

      toggle.onclick = async () => {
        if (!canTgstat) return;

        const tgBox = document.getElementById("tgstatCharts");
        if (tgOpen){
          tgBox.style.display = "none";
          tgOpen = false;
          toggle.classList.remove("open");
          return;
        }

        tgBox.style.display = "block";
        tgOpen = true;
        toggle.classList.add("open");

        if (tgLoaded) return;

        tgBox.innerHTML = `<div class="tgstat-wrap">${Array.from({length:6}).map(()=>`
          <div class="chart-card">
            <div class="chart-content">
              <div class="chart-main">
                <div class="skeleton value-skeleton"></div>
                <div class="chart-metrics">
                  <div class="skeleton metric-skeleton"></div>
                  <div class="skeleton metric-skeleton"></div>
                  <div class="skeleton metric-skeleton"></div>
                </div>
              </div>
              <div class="chart-wrap">
                <div class="skeleton chart-skeleton"></div>
              </div>
            </div>
          </div>
        `).join("")}</div>`;

        try{
          let charts;

          if (USE_MOCK_CHARTS) {
            await new Promise(r => setTimeout(r, 1200));
            charts = MOCK_TGSTAT_CHARTS;
          } else {
            const tgUrl = `${API_BASE}${TGSTAT_CHARTS_ENDPOINT}?channel_link=${encodeURIComponent(channelLink || "")}`;
            const r = await fetch(tgUrl);
            charts = await r.json();
          }

          renderTgstatCharts(charts);
          tgLoaded = true;

        }catch(err){
          tgBox.innerHTML = `<div class="tgstat-wrap"><div class="card"><div class="desc">Не удалось загрузить графики TGStat</div></div></div>`;
        }
      };
    }

    function tgTitleRu(key){
      const map = {
        "subscribers": "Подписчики",
        "views": "Просмотры",
        "avg-posts-reach": "Средний охват",
        "er": "ER",
        "err": "ERR",
        "err24": "ERR24"
      };
      return map[key] || key;
    }

    function tgPointValueGetter(title){
      const map = {
        "subscribers": (p)=>p.participants_count,
        "views": (p)=>p.views_count,
        "avg-posts-reach": (p)=>p.avg_posts_reach,
        "er": (p)=>p.er,
        "err": (p)=>p.err,
        "err24": (p)=>p.err24,
      };
      return map[title] || ((p)=>p.value);
    }

    function renderTgstatCharts(charts){
      const tgBox = document.getElementById("tgstatCharts");
      const wrap = document.createElement("div");
      wrap.className = "tgstat-wrap";

      (charts || []).forEach((c) => {
        const item = document.createElement("div");
        item.className = "chart-item";

        const label = document.createElement("div");
        label.className = "chart-item-title";
        label.textContent = tgTitleRu(c?.title);

        const card = document.createElement("div");
        card.className = "chart-card";

        const content = document.createElement("div");
        content.className = "chart-content";

        const left = document.createElement("div");
        left.className = "chart-main";
        const value = document.createElement("div");
        value.className = "chart-value";
        value.style.fontSize = "32px";
        value.textContent = (c?.current_value === null || c?.current_value === undefined) ? "—" : `${formatNumber(c.current_value)}`;

        const metrics = document.createElement("div");
        metrics.className = "chart-metrics";
        metrics.innerHTML = `
          <div class="chart-metric"><span class="chart-metric-value">${formatDelta(c?.yesterday_delta)}</span><span class="chart-metric-label">за вчера</span></div>
          <div class="chart-metric"><span class="chart-metric-value">${formatDelta(c?.week_delta)}</span><span class="chart-metric-label">за неделю</span></div>
          <div class="chart-metric"><span class="chart-metric-value">${formatDelta(c?.month_delta)}</span><span class="chart-metric-label">за месяц</span></div>
        `;

        left.appendChild(value);
        left.appendChild(metrics);

        const right = document.createElement("div");
        right.className = "chart-wrap";

        const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
        svg.setAttribute("viewBox","0 0 180 124");
        svg.setAttribute("preserveAspectRatio","none");

        const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");
        const grad = document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
        const gid = `areaGradient_${Math.random().toString(16).slice(2)}`;
        grad.setAttribute("id", gid);
        grad.setAttribute("x1","0"); grad.setAttribute("y1","0"); grad.setAttribute("x2","0"); grad.setAttribute("y2","1");

        const s1 = document.createElementNS("http://www.w3.org/2000/svg","stop");
        s1.setAttribute("offset","0%"); s1.setAttribute("stop-color","#4b78ff"); s1.setAttribute("stop-opacity","0.22");
        const s2 = document.createElementNS("http://www.w3.org/2000/svg","stop");
        s2.setAttribute("offset","100%"); s2.setAttribute("stop-color","#4b78ff"); s2.setAttribute("stop-opacity","0.02");

        grad.appendChild(s1); grad.appendChild(s2);
        defs.appendChild(grad);
        svg.appendChild(defs);

        const area = document.createElementNS("http://www.w3.org/2000/svg","path");
        area.setAttribute("class","chart-area");
        area.setAttribute("fill",`url(#${gid})`);

        const line = document.createElementNS("http://www.w3.org/2000/svg","path");
        line.setAttribute("class","chart-line");

        svg.appendChild(area);
        svg.appendChild(line);
        right.appendChild(svg);

        content.appendChild(left);
        content.appendChild(right);
        card.appendChild(content);
        item.appendChild(label);
        item.appendChild(card);
        wrap.appendChild(item);

        const getter = tgPointValueGetter(c?.title);
        const paths = buildChartPath(c?.points || [], 180, 124, {top:18,right:10,bottom:18,left:22}, getter);
        line.setAttribute("d", paths.line);
        area.setAttribute("d", paths.area);
      });

      const collapse = document.createElement("div");
      collapse.className = "tgstat-collapse";
      collapse.innerHTML = `<button type="button" aria-label="Свернуть">⌃</button>`;
      collapse.querySelector("button").onclick = () => {
        document.getElementById("tgstatCharts").style.display = "none";
        const t = document.getElementById("tgstatToggle");
        t.classList.remove("open");
        tgOpen = false;
      };

      wrap.appendChild(collapse);

      tgBox.innerHTML = "";
      tgBox.appendChild(wrap);
    }

    loadAnnoun();
  </script>
